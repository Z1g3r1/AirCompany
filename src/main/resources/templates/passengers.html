<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Пассажиры</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Список пассажиров</h1>
<form th:action="@{/logout}" method="post" style="display: inline;">
    <button type="submit">Выйти</button>
</form>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Возраст</th>
        <th>Пол</th>
        <th>Билет</th>
        <th>Рейс</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="passenger : ${passengers}">
        <td th:text="${passenger.id}"></td>
        <td th:text="${passenger.age}"></td>
        <td th:text="${passenger.gender}"></td>
        <td th:text="${passenger.has_ticket} ? 'Да' : 'Нет'"></td>
        <td th:text="${passenger.flight != null ? passenger.flight.flightNumber : 'Не назначен'}"></td>
    </tr>
    </tbody>
</table>

<p><a href="/flights/page">← К рейсам</a></p>
</body>
</html>
